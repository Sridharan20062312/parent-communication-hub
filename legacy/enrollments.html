<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduConnect - Enrollment Records">
    <title>Enrollments | Advisor Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .table-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.2rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 0.35rem 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        
        .status-completed { 
            background: rgba(16, 185, 129, 0.12); 
            color: #10b981; 
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="main-sidebar">
            <div class="logo">
                <span id="logo-shield" style="font-size: 2.2rem;">🛡️</span>
                <div style="margin-left: 0.8rem;">
                    <h1 style="font-size: 1.4rem; letter-spacing: 1px; margin: 0;">NAMMA GCE</h1>
                    <p style="font-size: 0.6rem; opacity: 0.6; margin: 0; letter-spacing: 0.5px; text-transform: uppercase;">Govt. College of Engineering</p>
                </div>
            </div>
            
            <nav id="primary-nav">
                <a href="advisor-portal.html" class="nav-item"><span class="icon" aria-hidden="true">📊</span> ADD STUDENTS</a>
                <a href="my-students.html" class="nav-item"><span class="icon" aria-hidden="true">👨‍🎓</span> My Students</a>
                <a href="enrollments.html" class="nav-item active"><span class="icon" aria-hidden="true">📝</span> Enrollments</a>
                <a href="staff-dashboard.html" class="nav-item"><span class="icon" aria-hidden="true">📅</span> Attendance</a>
                <a href="staff-dashboard.html" class="nav-item"><span class="icon" aria-hidden="true">📝</span> Manage Marks</a>
                <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
                    <a href="#" onclick="localStorage.removeItem('currentUser'); window.location.href='login.html';" class="nav-item logout-link" style="color: #ff4d6d; font-weight: 600;"><span class="icon" aria-hidden="true">🚪</span> Log Out</a>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="main-view">
            <header id="top-header">
                <div class="header-left">
                    <h2>Enrollment Records</h2>
                    <p>Track recently added students and their enrollment transaction history.</p>
                </div>
                <div class="header-right">
                    <button class="new-message-btn" onclick="window.location.href='advisor-portal.html'">+ Add New Student</button>
                    <button onclick="clearAllEnrollments()" style="margin-left: 1rem; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.8rem 1.2rem; border-radius: 12px; cursor: pointer; font-weight: 600;">🗑️ Clear All</button>
                </div>
            </header>

            <div class="table-container">
                <table id="enrollment-table">
                    <thead>
                        <tr>
                            <th>Reg No</th>
                            <th>Roll Number</th>
                            <th>Full Name</th>
                            <th>Email Address</th>
                            <th>Date Added</th>
                            <th>Status</th>
                            <th>Management</th>
                        </tr>
                    </thead>
                    <tbody id="enrollment-body">
                        <!-- Empty placeholder -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        function renderEnrollments() {
            const saved = JSON.parse(localStorage.getItem('studentEnrollments') || '[]');
            const tbody = document.getElementById('enrollment-body');
            tbody.innerHTML = '';
            
            if (saved.length === 0) {
                tbody.innerHTML = `
                    <tr id="empty-enrollment-msg">
                        <td colspan="7" style="text-align: center; padding: 4rem; color: var(--text-secondary);">
                            <span style="font-size: 2.5rem; display: block; margin-bottom: 1rem; opacity: 0.8;">📝</span>
                            No recent enrollments found. <br><br> Go to 'ADD STUDENTS' to enroll new students!
                        </td>
                    </tr>
                `;
                return;
            }
                
            // Sort students by Roll Number naturally (Ascending: 01, 02, 03...)
            const sorted = saved.sort((a, b) => {
                return a.rollNo.localeCompare(b.rollNo, undefined, {numeric: true, sensitivity: 'base'});
            });

            sorted.forEach((student, index) => {
                const tr = document.createElement('tr');
                const actualIndex = saved.length - 1 - index;
                tr.innerHTML = `
                    <td style="font-weight: 700; letter-spacing: 0.5px; color: var(--accent-primary);">${student.regNo}</td>
                    <td>${student.rollNo}</td>
                    <td>${student.fullName}</td>
                    <td style="color: var(--text-secondary);">${student.email}</td>
                    <td style="color: var(--text-secondary); font-size: 0.8rem;">${student.date}</td>
                    <td><span class="status-badge status-completed">Enrolled</span></td>
                    <td>
                        <button onclick="deleteEnrollment(${actualIndex})" style="background: rgba(239, 68, 68, 0.05); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.15); padding: 0.4rem 0.8rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700;">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteEnrollment(index) {
            if (confirm('Are you sure you want to delete this student record?')) {
                let saved = JSON.parse(localStorage.getItem('studentEnrollments') || '[]');
                saved.splice(index, 1);
                localStorage.setItem('studentEnrollments', JSON.stringify(saved));
                renderEnrollments();
            }
        }

        function clearAllEnrollments() {
            if (confirm('CAUTION: This will delete ALL enrollment records. Continue?')) {
                localStorage.setItem('studentEnrollments', '[]');
                renderEnrollments();
            }
        }

        window.addEventListener('DOMContentLoaded', renderEnrollments);
    </script>
</body>
</html>
