<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduConnect - Individual Student Profile">
    <title>Student Profile | Advisor Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- EMAILJS SDK FOR REAL EMAIL SENDING -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          const savedKey = localStorage.getItem('emailjs_public_key');
          if (savedKey) {
             emailjs.init(savedKey);
          } else {
             // Fallback for demo
             emailjs.init("YOUR_PUBLIC_KEY_HERE");
          }
       })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-header-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .avatar-xl {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 600;
        }

        .profile-info h2 {
            font-size: 2.2rem;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
        }

        .profile-info p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-bottom: 0.3rem;
        }

        .pill {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .detail-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .detail-card h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.8rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .info-label {
            color: var(--text-secondary);
        }

        .info-val {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="main-sidebar">
            <div class="logo">
                <span class="icon" aria-hidden="true">🧭</span>
                <h1>Advising Hub</h1>
            </div>
            
            <nav id="primary-nav">
                <a href="advisor-portal.html" class="nav-item"><span class="icon" aria-hidden="true">📊</span> ADD STUDENTS</a>
                <a href="my-students.html" class="nav-item"><span class="icon" aria-hidden="true">👨‍🎓</span> My Students</a>
                <a href="enrollments.html" class="nav-item"><span class="icon" aria-hidden="true">📝</span> Enrollments</a>
                <a href="#" class="nav-item"><span class="icon" aria-hidden="true">📅</span> Appointments <span class="badge">4</span></a>
                <a href="#" class="nav-item"><span class="icon" aria-hidden="true">⚙️</span> Settings</a>
            </nav>

            <div class="user-profile">
                <div class="avatar" aria-hidden="true">👨‍🏫</div>
                <div class="user-info">
                    <p class="name">Dr. Peterson</p>
                    <p class="role">CS Academic Advisor</p>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="main-view">
            <a href="my-students.html" class="back-link">← Back to Directory</a>
            
            <!-- Dynamic Injection Target -->
            <div id="profile-container">
                <div style="text-align: center; padding: 4rem; color: var(--text-secondary);">
                    Loading profile...
                </div>
            </div>

        </main>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const regNo = urlParams.get('reg');
            const container = document.getElementById('profile-container');

            if (!regNo) {
                container.innerHTML = '<h2 style="color:var(--text-primary);">Student not found.</h2><p style="color:var(--text-secondary);">No registration ID was provided.</p>';
                return;
            }

            const saved = JSON.parse(localStorage.getItem('studentEnrollments') || '[]');
            const student = saved.find(s => s.regNo === regNo);

            if (!student) {
                container.innerHTML = '<h2 style="color:var(--text-primary);">Student record does not exist.</h2><p style="color:var(--text-secondary);">This record may have been deleted.</p>';
                return;
            }

            const nameParts = student.fullName.split(' ');
            const initials = (nameParts[0].charAt(0) + (nameParts.length > 1 ? nameParts[1].charAt(0) : '')).toUpperCase();

            container.innerHTML = `
                <div class="profile-header-card">
                    <div class="avatar-xl">${initials}</div>
                    <div class="profile-info">
                        <h2>${student.fullName}</h2>
                        <p>Registration Number: <strong style="color:var(--text-primary);">${student.regNo}</strong></p>
                        <p>Enrolled on: ${student.date}</p>
                        <span class="pill">Active Status</span>
                    </div>
                    <div style="margin-left: auto; display: flex; gap: 1rem; align-items: center;">
                        <button onclick="toggleDirectMessage()" class="submit-btn" style="width: auto; background: var(--accent-primary); border: none; color: white; padding: 0.8rem 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: all 0.3s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);">
                            💬 Direct Message
                        </button>
                        <button onclick="deleteStudent('${student.regNo}')" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 0.8rem 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'">
                            🗑️ Delete Student
                        </button>
                    </div>
                </div>

                <!-- Direct Message Section -->
                <div id="direct-message-section" style="display: none; background: rgba(99, 102, 241, 0.05); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; animation: slideDown 0.3s ease-out;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                        <div>
                            <h3 style="color: white; font-size: 1.1rem; margin-bottom: 0.3rem;">✍️ Compose Direct Message to ${student.fullName}</h3>
                            <p style="color: #818cf8; font-size: 0.85rem; font-weight: 500;">📨 Link: <span style="text-decoration: underline;">${student.email}</span> | 📱 WhatsApp: <span style="color: #25d366;">${student.parentMobile || 'Not set'}</span></p>
                        </div>
                        <div style="text-align: right;">
                            <span style="font-size: 0.75rem; color: var(--text-secondary); display: block; margin-bottom: 0.3rem;">Sender Identification:</span>
                            <span style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700;">Verified Advisor 🛡️</span>
                        </div>
                    </div>
                    
                    <textarea id="direct-msg-text" style="width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; color: white; font-family: inherit; resize: none; outline: none; transition: border-color 0.3s;" placeholder="Type your message here (e.g., Results are out, please check the dashboard)..."></textarea>
                    
                    <div id="email-sync-indicator" style="display: none; margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid rgba(99, 102, 241, 0.1);">
                        <div style="display: flex; align-items: center; gap: 0.8rem; color: #818cf8; font-size: 0.85rem;">
                            <div class="spinner" style="width: 16px; height: 16px; border: 2px solid #818cf8; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                            <span id="sync-status">Routing through Education SMTP Relay...</span>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem; flex-wrap: wrap;">
                        <button onclick="toggleDirectMessage()" style="background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer;">Cancel</button>
                        <button onclick="sendWhatsApp('${student.regNo}', '${student.fullName}')" style="background: linear-gradient(135deg, #25d366, #128c7e); border: none; color: white; padding: 0.8rem 1.8rem; border-radius: 10px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); display: flex; align-items: center; gap: 0.6rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Send WhatsApp
                        </button>
                        <button onclick="sendDirectMessage('${student.regNo}', '${student.fullName}', '${student.email}')" style="background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; padding: 0.8rem 1.8rem; border-radius: 10px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); display: flex; align-items: center; gap: 0.6rem;">
                            🚀 Send to Email & Portal
                        </button>
                    </div>
                    <p id="msg-status" style="margin-top: 1rem; font-size: 0.85rem; display: none; text-align: center;"></p>
                </div>

                <style>
                    @keyframes slideDown { 
                        from { opacity: 0; transform: translateY(-10px); } 
                        to { opacity: 1; transform: translateY(0); } 
                    }
                    @keyframes spin { to { transform: rotate(360deg); } }
                    #direct-msg-text:focus { border-color: #818cf8; }
                </style>

                <div class="details-grid">
                    <div class="detail-card">
                        <h3>Academic Information</h3>
                        <div class="info-row">
                            <span class="info-label">Roll Number</span>
                            <span class="info-val">${student.rollNo}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Major/Department</span>
                            <span class="info-val">Computer Science</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Current Term GPA</span>
                            <span class="info-val" style="color:var(--success);">TBD</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Total Credits</span>
                            <span class="info-val">0 / 120</span>
                        </div>
                    </div>

                    <div class="detail-card">
                        <h3>Contact & Socials</h3>
                        <div class="info-row">
                            <span class="info-label">Email Address</span>
                            <span class="info-val" style="color:var(--accent-primary);">${student.email}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Profile / Portfolio Link</span>
                            <a href="${student.link}" target="_blank" class="info-val" style="color:var(--accent-primary); text-decoration:underline; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block;">View External Link 🔗</a>
                        </div>
                        <div class="info-row">
                            <span class="info-label">System Access</span>
                            <span class="info-val">Portal Invited</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Primary Campus</span>
                            <span class="info-val">Main Campus</span>
                        </div>
                    </div>
                </div>
                <div class="detail-card" style="grid-column: span 2; margin-top: 1.5rem;">
                    <h3 style="display: flex; justify-content: space-between; align-items: center;">
                        <span>📚 Subject Marksheet (Official)</span>
                        <span style="font-size: 0.75rem; background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 0.2rem 0.6rem; border-radius: 6px;">Staff Verified</span>
                    </h3>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                            <thead>
                                <tr style="text-align: left; border-bottom: 2px solid var(--border-color);">
                                    <th style="padding: 1rem; color: var(--text-secondary); font-weight: 500;">Subject</th>
                                    <th style="padding: 1rem; color: var(--text-secondary); font-weight: 500;">Internal (60)</th>
                                    <th style="padding: 1rem; color: var(--text-secondary); font-weight: 500;">Assignment (40)</th>
                                    <th style="padding: 1rem; color: var(--text-primary); font-weight: 700;">Total (100)</th>
                                </tr>
                            </thead>
                            <tbody id="marksheet-body">
                                <tr>
                                    <td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-secondary);">No academic marks recorded by staff yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            // INJECT MARKS FROM STAFF RECORDS
            const markRecords = JSON.parse(localStorage.getItem('staffMarkRecords') || '{}');
            const studentMarks = markRecords[student.rollNo];
            
            if (studentMarks && Object.keys(studentMarks).length > 0) {
                const marksBody = document.getElementById('marksheet-body');
                marksBody.innerHTML = '';
                
                Object.keys(studentMarks).forEach(subj => {
                    const data = studentMarks[subj];
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = '1px solid rgba(255,255,255,0.03)';
                    tr.innerHTML = `
                        <td style="padding: 1rem; font-weight: 600; color: white;">${subj}</td>
                        <td style="padding: 1rem; color: #10b981;">${data.internal}</td>
                        <td style="padding: 1rem; color: #6366f1;">${data.lab}</td>
                        <td style="padding: 1rem; font-weight: 700; color: white; background: rgba(16, 185, 129, 0.05);">${data.total}</td>
                    `;
                    marksBody.appendChild(tr);
                });
            }
        });

        function toggleDirectMessage() {
            const section = document.getElementById('direct-message-section');
            if (section.style.display === 'none') {
                section.style.display = 'block';
                document.getElementById('direct-msg-text').focus();
            } else {
                section.style.display = 'none';
            }
        }

        function sendDirectMessage(regNo, studentName, studentEmail) {
            const text = document.getElementById('direct-msg-text').value.trim();
            const status = document.getElementById('msg-status');
            const sync = document.getElementById('email-sync-indicator');
            const syncStatus = document.getElementById('sync-status');
            
            if (!text) {
                status.style.display = 'block';
                status.style.color = '#ef4444';
                status.textContent = '⚠️ Please enter some text before sending.';
                return;
            }

            sync.style.display = 'block';
            status.style.display = 'none';

            let step = 0;
            const steps = [
                "Connecting to SMTP Server...",
                "Verifying Advisor Identity...",
                `Relaying to ${studentEmail}...`,
                "Broadcast Finalized! ✨"
            ];

            const syncInterval = setInterval(() => {
                syncStatus.textContent = steps[step];
                step++;
                if (step >= steps.length) {
                    clearInterval(syncInterval);
                    
                    // ATTEMPT REAL EMAIL SENDING VIA REGISTERED KEYS
                    const serviceID = localStorage.getItem('emailjs_service_id') || 'YOUR_SERVICE_ID';
                    const templateID = localStorage.getItem('emailjs_template_id') || 'YOUR_TEMPLATE_ID';
                    
                    const templateParams = {
                        to_name: studentName,
                        to_email: studentEmail,
                        message: text,
                        from_name: 'Advisor Peterson'
                    };

                    const isKeySet = localStorage.getItem('emailjs_public_key') && serviceID !== 'YOUR_SERVICE_ID';

                    if (isKeySet) {
                        emailjs.send(serviceID, templateID, templateParams)
                            .then(() => completeProcess(true))
                            .catch((err) => {
                                console.error('EmailJS Error:', err);
                                completeProcess(false, "Config Error: Check your Keys in Settings");
                            });
                    } else {
                        completeProcess(false, "Email System Offline (Missing Keys in Settings)");
                    }
                }
            }, 600);

            function completeProcess(isEmailSent, errorMsg = "") {
                const newMessage = {
                    from: 'Advisor - Dr. Peterson',
                    text: text,
                    timestamp: new Date().toLocaleString(),
                    regNo: regNo.toUpperCase().trim(), // Normalize case
                    unread: true
                };

                const allMessages = JSON.parse(localStorage.getItem('nammaGCE_AdvisorMessages') || '[]');
                allMessages.push(newMessage);
                localStorage.setItem('nammaGCE_AdvisorMessages', JSON.stringify(allMessages));

                sync.style.display = 'none';
                status.style.display = 'block';
                
                if (isEmailSent) {
                    status.style.color = '#10b981';
                    status.innerHTML = `✅ <b>Real Email Sent!</b><br><small>Delivered to ${studentEmail} and Dashboard.</small>`;
                } else {
                    status.style.color = '#f59e0b';
                    status.innerHTML = `⚠️ <b>Portal Delivered, but Email Failed</b><br><small>${errorMsg}. Please update your EmailJS keys at line 12.</small>`;
                }
                
                document.getElementById('direct-msg-text').value = '';
                setTimeout(() => { toggleDirectMessage(); status.style.display = 'none'; }, 5000);
            }
        }

        function sendWhatsApp(regNo, studentName) {
            const text = document.getElementById('direct-msg-text').value.trim();
            if (!text) {
                const status = document.getElementById('msg-status');
                status.style.display = 'block';
                status.style.color = '#ef4444';
                status.textContent = '⚠️ Please type your message before sending.';
                return;
            }

            const saved = JSON.parse(localStorage.getItem('studentEnrollments') || '[]');
            const student = saved.find(s => s.regNo === regNo);
            
            let parentMobile = student ? student.parentMobile : '';
            if (!parentMobile) {
                parentMobile = prompt(`Enter Parent's WhatsApp number for ${studentName} (include country code, e.g. 919876543210):`, '');
                if (!parentMobile) return;
                if (student) {
                    student.parentMobile = parentMobile;
                    localStorage.setItem('studentEnrollments', JSON.stringify(saved));
                }
            }

            let callMeBotKey = student ? student.callMeBotKey : '';
            if (!callMeBotKey) {
                // Show registration instructions popup
                const setup = confirm(
                    `🔑 Parent WhatsApp API Key not found for ${studentName}.\n\n` +
                    `To send WITHOUT opening any app:\n` +
                    `1. Parent should save this WhatsApp number: +34 644 59 77 09\n` +
                    `2. Parent sends this message: "I allow callmebot to send me messages"\n` +
                    `3. Parent will get an API key as reply\n\n` +
                    `Click OK to enter the API key now, or Cancel to skip.`
                );
                if (!setup) return;
                callMeBotKey = prompt(`Enter the CallMeBot API Key received by parent (${studentName}):`, '');
                if (!callMeBotKey) return;
                if (student) {
                    student.callMeBotKey = callMeBotKey;
                    localStorage.setItem('studentEnrollments', JSON.stringify(saved));
                }
            }

            const status = document.getElementById('msg-status');
            status.style.display = 'block';
            status.style.color = '#f59e0b';
            status.innerHTML = `<div style="display:flex;align-items:center;gap:0.5rem;"><div style="width:14px;height:14px;border:2px solid #25d366;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;"></div> 📤 Sending WhatsApp message directly...</div>`;

            const waMessage = `📚 *NAMMA GCE Academic Update*\n\nDear Parent,\n\n${text}\n\n_Regards,_\n_NAMMA GCE Academic Advisor_`;
            const cleanNumber = parentMobile.replace(/\D/g, '').replace(/^0+/, '');
            const waNumber = cleanNumber.startsWith('91') ? cleanNumber : '91' + cleanNumber;

            // CallMeBot API - sends WhatsApp directly, no app/website needed
            const apiUrl = `https://api.callmebot.com/whatsapp.php?phone=${waNumber}&text=${encodeURIComponent(waMessage)}&apikey=${callMeBotKey}`;

            fetch(apiUrl, { mode: 'no-cors' })
                .then(() => {
                    status.style.color = '#25d366';
                    status.innerHTML = `✅ <b>WhatsApp Sent Directly!</b><br><small>Message delivered to +${waNumber} without opening any app.</small>`;
                })
                .catch(() => {
                    status.style.color = '#ef4444';
                    status.innerHTML = `❌ <b>Failed to send.</b><br><small>Check the parent's CallMeBot API Key or internet connection.</small>`;
                });
        }

        function deleteStudent(regNo) {
            if (confirm('⚠️ WARNING: Are you sure you want to delete this student record? This action cannot be undone and will remove all academic data for this student.')) {
                let saved = JSON.parse(localStorage.getItem('studentEnrollments') || '[]');
                const originalCount = saved.length;
                saved = saved.filter(s => s.regNo !== regNo);
                
                if (saved.length < originalCount) {
                    localStorage.setItem('studentEnrollments', JSON.stringify(saved));
                    alert('✅ Student record deleted successfully.');
                    window.location.href = 'advisor-portal.html';
                } else {
                    alert('❌ Error: Could not find record to delete.');
                }
            }
        }
    </script>
</body>
</html>
