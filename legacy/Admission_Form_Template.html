<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form - Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gray: #334155;
            --border-light: #e2e8f0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .pdf-page {
            width: 210mm; /* A4 Width */
            min-height: 297mm; /* A4 Height */
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 40px 60px;
            box-sizing: border-box;
            border-top: 8px solid #ec4899; /* Pink brand accent */
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 30px;
            margin-bottom: 50px;
        }

        .header h1 {
            color: #1e293b;
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            color: #64748b;
            margin-top: 10px;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .form-section-title {
            font-weight: 700;
            color: #ec4899;
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid #fce7f3;
            padding-bottom: 5px;
            margin-bottom: 25px;
        }

        .field-row {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
        }

        .field-group {
            flex: 1;
        }

        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .field-input {
            width: 100%;
            height: 45px;
            border: 2px solid #f1f5f9;
            border-radius: 6px;
            background: #f8fafc;
        }

        .signature-area {
            margin-top: 100px;
            display: flex;
            justify-content: space-between;
        }

        .sig-box {
            width: 200px;
            text-align: center;
        }

        .sig-line {
            border-top: 1px solid #94a3b8;
            margin-bottom: 10px;
        }

        .sig-text {
            font-size: 12px;
            color: #64748b;
        }

        @media print {
            body { background: none; padding: 0; }
            .pdf-page { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="pdf-page">
        <div class="header">
            <h1>🎓 EDUCATION CONNECT</h1>
            <p>Academic Year 2026-2027 | Admission Registration Form</p>
        </div>

        <div class="form-section">
            <div class="form-section-title">Academic Details</div>
            
            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">Registration Number (Reg No)</label>
                    <div class="field-input"></div>
                </div>
                <div class="field-group">
                    <label class="field-label">Roll Number</label>
                    <div class="field-input"></div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Personal Information</div>
            
            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">Full Name of Student</label>
                    <div class="field-input"></div>
                </div>
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">Contact Email Address</label>
                    <div class="field-input"></div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">Office Use Only</div>
            <div style="height: 100px; border: 1px dashed #cbd5e1; border-radius: 8px;"></div>
        </div>

        <div class="signature-area">
            <div class="sig-box">
                <div class="sig-line"></div>
                <div class="sig-text">Student Signature</div>
            </div>
            <div class="sig-box">
                <div class="sig-line"></div>
                <div class="sig-text">Parent/Guardian Signature</div>
            </div>
            <div class="sig-box">
                <div class="sig-line"></div>
                <div class="sig-text">Office Counselor Stamp</div>
            </div>
        </div>
    </div>
</body>
</html>
