<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduConnect Advisor Portal - Login for academic advisors and counselors">
    <title>Advisor Portal | Smart Class Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        /* Specific adjustments for Advisor Login */
        .advisor-badge {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: inline-block;
            border: 1px solid rgba(99, 102, 241, 0.3);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .department-select {
            width: 100%;
            padding: 1rem 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
            cursor: pointer;
        }
        
        .department-select:focus {
            border-color: var(--accent-advisor);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }
        
        .department-select option {
            background-color: var(--bg-dark);
            color: white;
        }

        .sso-button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .sso-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .divider::before {
            margin-right: .5em;
        }
        
        .divider::after {
            margin-left: .5em;
        }

        /* Set advisor accent explicitly for background shapes since we don't use dynamic role JS here */
        .shape-1 { background: var(--accent-advisor); }
        .submit-btn { background: var(--accent-advisor); }
        .submit-btn:hover { background: #4f46e5; }
        .forgot-password { color: var(--accent-advisor); }
        .remember-me input { accent-color: var(--accent-advisor); }
    </style>
</head>
<body data-role="advisor">
    <!-- Animated background shapes -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="login-container">
        <!-- Main glassmorphism card -->
        <main class="login-card glass-panel" style="text-align: center;">
            <div class="advisor-badge">Faculty & Staff Only</div>
            
            <header class="logo" style="margin-bottom: 1.5rem;">
                <span class="icon" aria-hidden="true">🧭</span>
                <h1>Advisor Portal</h1>
            </header>
            
            <p class="subtitle">Access student records and advising tools</p>

            <form id="advisor-login-form" style="text-align: left;">
                <div class="input-group" style="margin-bottom: 1rem;">
                    <label for="department">Department / Faculty</label>
                    <select id="department" class="department-select" required>
                        <option value="" disabled selected>Select your department...</option>
                        <option value="cs">Computer Science Department</option>
                        <option value="academic">Academic Advising</option>
                        <option value="career">Career Counseling</option>
                        <option value="financial">Financial Aid</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="faculty-id">Faculty ID or Email</label>
                    <input type="text" id="faculty-id" placeholder="Enter your Faculty ID" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember device
                    </label>
                    <a href="#" class="forgot-password">Reset Password</a>
                </div>

                <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
                
                <div class="divider">OR</div>
                
                <button type="button" class="sso-button">
                    <span class="icon" aria-hidden="true">🔐</span>
                    Continue with Faculty SSO
                </button>
            </form>
            
            <footer class="footer-text">
                <p>Need access? <a href="#">Contact IT Helpdesk</a></p>
            </footer>
        </main>
    </div>

    <script>
        document.getElementById('advisor-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const originalText = btn.textContent;
            
            btn.innerHTML = 'Authenticating...';
            btn.style.opacity = '0.8';
            
            // Simulate authentication request
            setTimeout(() => {
                btn.innerHTML = 'Success! Redirecting...';
                btn.style.backgroundColor = '#10b981'; // Success green
                
                // Redirect to the Advisor Portal
                setTimeout(() => {
                    window.location.href = "advisor-portal.html";
                }, 1000);
            }, 1000);
        });
    </script>
</body>
</html>
